<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB7.MIKEY</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2233;
    --orange: #ff6600;
    --dark: #080a0e;
    --darker: #04050a;
    --card: #0c0f16;
    --card2: #111520;
    --border: rgba(255,34,51,0.2);
    --border2: rgba(255,34,51,0.5);
    --text: #eceef5;
    --muted: #6a7080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,34,51,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,34,51,0.03) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(255,34,51,0.08) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 660px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 5rem;
  }

  .hero {
    text-align: center;
    margin-bottom: 2.8rem;
    animation: fadeDown 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  .avatar-wrap {
    width: 120px;
    height: 120px;
    margin: 0 auto 1.6rem;
    position: relative;
  }

  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    animation: rgbSpin 2s linear infinite;
  }

  @keyframes rgbSpin {
    0%   { background: conic-gradient(#ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); transform: rotate(0deg); }
    100% { transform: rotate(360deg); background: conic-gradient(#ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); }
  }

  .avatar-ring2 {
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .avatar-inner {
    position: absolute;
    inset: 5px;
    z-index: 2;
    border-radius: 50%;
    background: linear-gradient(145deg, #0f1520, #08090f);
    border: 2px solid #060810;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
    animation: rgbText 3s linear infinite;
  }

  @keyframes rgbText {
    0%   { color: #ff0000; text-shadow: 0 0 16px #ff0000; }
    16%  { color: #ff9900; text-shadow: 0 0 16px #ff9900; }
    33%  { color: #ffff00; text-shadow: 0 0 16px #ffff00; }
    50%  { color: #00ff88; text-shadow: 0 0 16px #00ff88; }
    66%  { color: #00cfff; text-shadow: 0 0 16px #00cfff; }
    83%  { color: #cc00ff; text-shadow: 0 0 16px #cc00ff; }
    100% { color: #ff0000; text-shadow: 0 0 16px #ff0000; }
  }

  .name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 8vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.14em;
    line-height: 1;
    margin-bottom: 0.6rem;
    background: linear-gradient(135deg, #ffffff 20%, #ffb3b8 55%, var(--red) 75%, var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,34,51,0.3));
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 1.2rem;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), var(--orange), transparent);
    margin: 0 auto;
    opacity: 0.7;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin: 1.6rem 0 2.8rem;
    animation: fadeUp 0.6s 0.2s cubic-bezier(.22,1,.36,1) both;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--red);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .stat-sep {
    width: 1px;
    background: rgba(255,34,51,0.15);
    align-self: stretch;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.3rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.22s, transform 0.22s, background 0.22s, box-shadow 0.22s;
    animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--red), var(--orange));
    opacity: 0;
    transition: opacity 0.22s;
    border-radius: 14px 0 0 14px;
  }

  .card:nth-child(1) { animation-delay: 0.18s; }
  .card:nth-child(2) { animation-delay: 0.28s; }
  .card:nth-child(3) { animation-delay: 0.38s; }

  .card:hover {
    border-color: var(--border2);
    background: var(--card2);
    transform: translateX(6px);
    box-shadow: -6px 0 24px rgba(255,34,51,0.1), 0 4px 20px rgba(0,0,0,0.3);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon.yt { background: rgba(255,0,0,0.1); border: 0.5px solid rgba(255,0,0,0.2); }
  .card-icon.ig { background: rgba(200,80,200,0.1); border: 0.5px solid rgba(200,80,200,0.2); }
  .card-icon.ff { background: rgba(255,102,0,0.1); border: 0.5px solid rgba(255,102,0,0.2); }

  .card-icon svg { width: 22px; height: 22px; }
  .card-info { flex: 1; min-width: 0; }

  .card-platform {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;
  }

  .card-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .card-arrow {
    color: var(--red);
    font-size: 18px;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.2s;
    flex-shrink: 0;
  }

  .card:hover .card-arrow { opacity: 1; transform: translateX(4px); }

  .card.static { cursor: default; }
  .card.static:hover { transform: none; box-shadow: none; }

  .uid-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }

  .uid-badge {
    font-size: 10px;
    font-family: 'Orbitron', monospace;
    color: var(--orange);
    background: rgba(255,102,0,0.08);
    border: 0.5px solid rgba(255,102,0,0.25);
    border-radius: 4px;
    padding: 2px 8px;
    letter-spacing: 0.06em;
  }

  .copy-btn {
    font-size: 9px;
    font-family: 'Rajdhani', sans-serif;
    color: var(--muted);
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    padding: 2px 9px;
    cursor: pointer;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }

  .copy-btn:hover { color: var(--orange); border-color: rgba(255,102,0,0.4); background: rgba(255,102,0,0.06); }

  /* ── MEDIA SECTION ── */
  .media-section {
    margin-top: 2.8rem;
    animation: fadeUp 0.6s 0.45s cubic-bezier(.22,1,.36,1) both;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,34,51,0.2), transparent);
  }

  .media-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .media-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }

  .media-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, #ff0000, #ff6600);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 12px 0 0 12px;
  }

  .media-item:hover {
    border-color: var(--border2);
    background: var(--card2);
    transform: translateX(5px);
  }

  .media-item:hover::before { opacity: 1; }

  .media-thumb {
    width: 80px;
    height: 56px;
    border-radius: 8px;
    flex-shrink: 0;
    background: rgba(255,0,0,0.06);
    border: 0.5px solid rgba(255,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .media-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }

  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .media-item:hover .play-overlay { opacity: 1; }

  .play-icon {
    width: 26px;
    height: 26px;
    background: rgba(255,0,0,0.85);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-icon svg { width: 10px; height: 10px; fill: #fff; margin-left: 2px; }

  .thumb-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  .thumb-placeholder svg { width: 24px; height: 24px; opacity: 0.3; }

  .media-info { flex: 1; min-width: 0; }

  .media-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-height: 1.4;
  }

  .media-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.06em;
  }

  .media-arrow {
    color: var(--red);
    font-size: 16px;
    opacity: 0.35;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  .media-item:hover .media-arrow { opacity: 1; }

  /* Skeleton loader */
  .skeleton {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
  }

  .skel-thumb {
    width: 80px;
    height: 56px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    flex-shrink: 0;
    animation: shimmer 1.4s infinite;
  }

  .skel-lines { flex: 1; }

  .skel-line {
    height: 11px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    margin-bottom: 8px;
    animation: shimmer 1.4s infinite;
  }

  .skel-line:last-child { width: 55%; margin-bottom: 0; }

  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .error-msg {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 1.5rem;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    letter-spacing: 0.05em;
  }

  .footer {
    text-align: center;
    margin-top: 3.5rem;
    font-size: 10px;
    color: rgba(255,255,255,0.08);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    animation: fadeUp 0.6s 0.55s cubic-bezier(.22,1,.36,1) both;
  }

  .footer-line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,34,51,0.15), transparent);
    margin: 0 auto 1rem;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<script>
const YT_API_KEY = 'AIzaSyDlRi_brzCknoa8DUaWV7MsSoDBZ7BBLZ4';
const CHANNEL_HANDLE = 'DB7MIKEY';
const MAX_RESULTS = 3;

function copyUID() {
  navigator.clipboard.writeText('895221161').then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    btn.style.color = '#ff6600';
    btn.style.borderColor = 'rgba(255,102,0,0.5)';
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 60) return 'Abhi abhi';
  if (diff < 3600) return Math.floor(diff / 60) + ' min pehle';
  if (diff < 86400) return Math.floor(diff / 3600) + ' ghante pehle';
  if (diff < 2592000) return Math.floor(diff / 86400) + ' din pehle';
  if (diff < 31536000) return Math.floor(diff / 2592000) + ' mahine pehle';
  return Math.floor(diff / 31536000) + ' saal pehle';
}

function renderVideos(videos) {
  const list = document.getElementById('yt-list');
  if (!videos.length) {
    list.innerHTML = '<div class="error-msg">Koi video nahi mila. Channel check karo.</div>';
    return;
  }
  list.innerHTML = videos.map(v => `
    <a class="media-item" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
      <div class="media-thumb">
        <img src="${v.thumb}" alt="${v.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="thumb-placeholder" style="display:none">
          <svg viewBox="0 0 24 24" fill="#ff0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><polygon fill="#fff" points="9.75,15.5 15.5,12 9.75,8.5"/></svg>
        </div>
        <div class="play-overlay">
          <div class="play-icon"><svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg></div>
        </div>
      </div>
      <div class="media-info">
        <div class="media-title">${v.title}</div>
        <div class="media-meta">${timeAgo(v.date)}</div>
      </div>
      <div class="media-arrow">→</div>
    </a>
  `).join('');
}

async function fetchChannelId() {
  const url = `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${CHANNEL_HANDLE}&key=${YT_API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.items && data.items.length) return data.items[0].id;
  throw new Error('Channel not found');
}

async function fetchUploadPlaylistId(channelId) {
  const url = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}&key=${YT_API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.items[0].contentDetails.relatedPlaylists.uploads;
}

async function fetchLatestVideos(playlistId) {
  const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=${MAX_RESULTS}&key=${YT_API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.items.map(item => ({
    id: item.snippet.resourceId.videoId,
    title: item.snippet.title,
    thumb: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
    date: item.snippet.publishedAt
  }));
}

async function loadYouTubeVideos() {
  try {
    const channelId = await fetchChannelId();
    const playlistId = await fetchUploadPlaylistId(channelId);
    const videos = await fetchLatestVideos(playlistId);
    renderVideos(videos);
  } catch (err) {
    document.getElementById('yt-list').innerHTML =
      `<div class="error-msg">Videos load nahi hue. API key ya channel check karo.<br><small style="opacity:0.5">${err.message}</small></div>`;
  }
}

loadYouTubeVideos();
</script>
