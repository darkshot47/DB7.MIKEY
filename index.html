<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB7.MIKEY</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2233;
    --orange: #ff6600;
    --dark: #080a0e;
    --darker: #04050a;
    --card: #0c0f16;
    --card2: #111520;
    --border: rgba(255,34,51,0.2);
    --border2: rgba(255,34,51,0.5);
    --text: #eceef5;
    --muted: #6a7080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,34,51,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,34,51,0.03) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(255,34,51,0.08) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 660px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 5rem;
  }

  .hero {
    text-align: center;
    margin-bottom: 2.8rem;
    animation: fadeDown 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  .avatar-wrap {
    width: 120px;
    height: 120px;
    margin: 0 auto 1.6rem;
    position: relative;
  }

  /* RGB spinning ring using canvas-style animation */
  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    animation: rgbSpin 2s linear infinite;
  }

  @keyframes rgbSpin {
    0%   { background: conic-gradient(#ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); transform: rotate(0deg); }
    100% { transform: rotate(360deg); background: conic-gradient(#ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); }
  }

  .avatar-ring2 {
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .avatar-inner {
    position: absolute;
    inset: 5px;
    z-index: 2;
    border-radius: 50%;
    background: linear-gradient(145deg, #0f1520, #08090f);
    border: 2px solid #060810;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
    animation: rgbText 3s linear infinite;
  }

  @keyframes rgbText {
    0%   { color: #ff0000; text-shadow: 0 0 16px #ff0000; }
    16%  { color: #ff9900; text-shadow: 0 0 16px #ff9900; }
    33%  { color: #ffff00; text-shadow: 0 0 16px #ffff00; }
    50%  { color: #00ff88; text-shadow: 0 0 16px #00ff88; }
    66%  { color: #00cfff; text-shadow: 0 0 16px #00cfff; }
    83%  { color: #cc00ff; text-shadow: 0 0 16px #cc00ff; }
    100% { color: #ff0000; text-shadow: 0 0 16px #ff0000; }
  }

  .name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 8vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.14em;
    line-height: 1;
    margin-bottom: 0.6rem;
    background: linear-gradient(135deg, #ffffff 20%, #ffb3b8 55%, var(--red) 75%, var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,34,51,0.3));
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 1.2rem;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), var(--orange), transparent);
    margin: 0 auto;
    opacity: 0.7;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin: 1.6rem 0 2.8rem;
    animation: fadeUp 0.6s 0.2s cubic-bezier(.22,1,.36,1) both;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--red);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .stat-sep {
    width: 1px;
    background: rgba(255,34,51,0.15);
    align-self: stretch;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.3rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.22s, transform 0.22s, background 0.22s, box-shadow 0.22s;
    animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--red), var(--orange));
    opacity: 0;
    transition: opacity 0.22s;
    border-radius: 14px 0 0 14px;
  }

  .card:nth-child(1) { animation-delay: 0.18s; }
  .card:nth-child(2) { animation-delay: 0.28s; }
  .card:nth-child(3) { animation-delay: 0.38s; }

  .card:hover {
    border-color: var(--border2);
    background: var(--card2);
    transform: translateX(6px);
    box-shadow: -6px 0 24px rgba(255,34,51,0.1), 0 4px 20px rgba(0,0,0,0.3);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon.yt { background: rgba(255,0,0,0.1); border: 0.5px solid rgba(255,0,0,0.2); }
  .card-icon.ig { background: rgba(200,80,200,0.1); border: 0.5px solid rgba(200,80,200,0.2); }
  .card-icon.ff { background: rgba(255,102,0,0.1); border: 0.5px solid rgba(255,102,0,0.2); }

  .card-icon svg { width: 22px; height: 22px; }

  .card-info { flex: 1; min-width: 0; }

  .card-platform {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;
  }

  .card-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .card-arrow {
    color: var(--red);
    font-size: 18px;
    opacity: 0.4;
    transition: opacity 0.2s, transform 0.2s;
    flex-shrink: 0;
  }

  .card:hover .card-arrow { opacity: 1; transform: translateX(4px); }

  .card.static { cursor: default; }
  .card.static:hover { transform: none; box-shadow: none; }

  .uid-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }

  .uid-badge {
    font-size: 10px;
    font-family: 'Orbitron', monospace;
    color: var(--orange);
    background: rgba(255,102,0,0.08);
    border: 0.5px solid rgba(255,102,0,0.25);
    border-radius: 4px;
    padding: 2px 8px;
    letter-spacing: 0.06em;
  }

  .copy-btn {
    font-size: 9px;
    font-family: 'Rajdhani', sans-serif;
    color: var(--muted);
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    padding: 2px 9px;
    cursor: pointer;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }

  .copy-btn:hover { color: var(--orange); border-color: rgba(255,102,0,0.4); background: rgba(255,102,0,0.06); }

  .footer {
    text-align: center;
    margin-top: 3.5rem;
    font-size: 10px;
    color: rgba(255,255,255,0.08);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    animation: fadeUp 0.6s 0.55s cubic-bezier(.22,1,.36,1) both;
  }

  .footer-line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,34,51,0.15), transparent);
    margin: 0 auto 1rem;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-ring2"></div>
      <div class="avatar-inner">DB7</div>
    </div>
    <div class="name">DB7.MIKEY</div>
    <div class="tagline">Content Creator &nbsp;·&nbsp; Gamer</div>
    <div class="divider"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">YT</div>
      <div class="stat-label">YouTube</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-num">IG</div>
      <div class="stat-label">Instagram</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-num">FF</div>
      <div class="stat-label">Free Fire</div>
    </div>
  </div>

  <div class="cards">

    <a class="card" href="https://youtube.com/@DB7MIKEY" target="_blank" rel="noopener">
      <div class="card-icon yt">
        <svg viewBox="0 0 24 24" fill="#ff0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><polygon fill="#fff" points="9.75,15.5 15.5,12 9.75,8.5"/></svg>
      </div>
      <div class="card-info">
        <div class="card-platform">YouTube</div>
        <div class="card-name">@DB7MIKEY</div>
        <div class="card-detail">Subscribe karo 🔴</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card" href="https://instagram.com/db7.mikey" target="_blank" rel="noopener">
      <div class="card-icon ig">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#ig-grad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="ig-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f09433"/>
              <stop offset="50%" stop-color="#e6683c"/>
              <stop offset="100%" stop-color="#bc1888"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="url(#ig-grad)" stroke="none"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-platform">Instagram</div>
        <div class="card-name">@db7.mikey</div>
        <div class="card-detail">Follow for updates</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <div class="card static">
      <div class="card-icon ff">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ff6600" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L3 7v10l9 5 9-5V7z"/>
          <path d="M12 2v20M3 7l9 5 9-5"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-platform">Free Fire</div>
        <div class="card-name">DB7.MIKEY</div>
        <div class="uid-row">
          <span class="uid-badge">UID: 895221161</span>
          <button class="copy-btn" onclick="copyUID()">Copy</button>
        </div>
      </div>
    </div>

  </div>

  <div class="footer">
    <div class="footer-line"></div>
    DB7.MIKEY &nbsp;·&nbsp; 2025
  </div>
</div>

<script>
function copyUID() {
  navigator.clipboard.writeText('895221161').then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    btn.style.color = '#ff6600';
    btn.style.borderColor = 'rgba(255,102,0,0.5)';
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}
</script>
</body>
</html>
